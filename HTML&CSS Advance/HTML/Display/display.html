<!DOCTYPE html>
<html lang="en">
<head>
  <title>Learning Display</title>
  <style>
    *{
      padding: 0px;
      margin: 0px;
    }
    .box{
      background-color: blueviolet;
      height: 50px;
      font-size: 25px;
      margin: 2px;
      width: 100px;
      padding: 10px;
      box-sizing: border-box;
      border: 2px dotted black;
      display: block;
    }
    #box3{
      background-color: aqua;
      height: 50px;
      width: 100px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">Box1</div>
  <div class="box">Box2</div>

  <span>span1</span>
  <span>span2</span>
  <div id="box3">Box3</div>
</body>
</html>
