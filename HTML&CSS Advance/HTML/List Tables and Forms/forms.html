<!DOCTYPE html>
<html lang="en">
<head>
  <title>forms tag</title>
</head>
<body>
  <form action="/collect_data">
    <input type="text" placeholder="Enter your email" name="Email">
    <br><br>
     Email: <input type="text" placeholder="abc@gmail.com" required name="Email">
     <br><br>
     password:<input type="password" name="password">
     <br><br>
     <input type="name" name="name" value="saurabh">
     <input type="date">
     <br><br>
     <input type="file">
     <br><br>
     <input type="color">
     <br><br>
     <input type="range">
     <br><br>
     <input type="button" value="Click me">
     <br><br>
     <label for="female">female</label>
     <input type="radio" value="f" name="gender" id="female">
     <label for="male">Male</label>
     <input type="radio" value="m" name="gender" id="male">
     <label for="other">Other</label>
     <input type="radio" value="o" name="gender" id="other">
      <br><br>
      <label for="banana">Banana</label>
      <input type="checkbox" id="banana" value="Banana" name="fruits">
      <br>
      <label for="apple">Apple</label>
      <input type="checkbox" id="apple" value="Apple" name="fruits">
     <br><br>
     <label for="fruits_new">Choose any one fruit:</label>
     <select name="fruits_new" id="fruits_new">
      <option value="apple">🍎Apple</option>
      <option value="kiwi">🥝Kiwi</option>
      <option value="orange">🍊Orange</option>
      <option value="cherry">🍓Cherry</option>
     </select>
     <br><br>
    <label for="text">Enter your description</label><br>
    <textarea name="text" id="text" rows="4" cols="20">Default text Area</textarea>
    <br><br>
    <input type="submit">
  </form>
</body>
</html>
