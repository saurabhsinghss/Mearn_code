<!DOCTYPE html>
<html lang="en">
<head>
  <title>Animation</title>
  <style>
    .box{
      height: 80px;
      width: 120px;
      margin: 50px;
      background-color: orange;
      border-radius: 20px;
      border: 5px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      position: absolute;
      
      animation-name: saurabh;
      animation-duration: 2s;
      animation-iteration-count: 5;
      animation-delay: 1s;
      animation-direction: reverse;
    }
    @keyframes saurabh{
      /* from{
        left: 0px;
      }
      to{
        left: 200px;
      } */

      0%{
        top: 0px;
        left: 0px;
      }
      50%{
        top: 50px;
      }
      100%{
        top: 0px;
        left: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="box">My Box</div>
</body>
</html>
