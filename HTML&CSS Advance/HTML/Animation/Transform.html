<!DOCTYPE html>
<html lang="en">
<head>
  <title>Transform</title>
  <style>
    .box{
      height: 80px;
      width: 120px;
      margin: 50px;
      background-color: orange;
      border-radius: 20px;
      border: 5px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      transition:all 1s;
    }
    .box:hover{
      background-color: blueviolet;
      transform:skew(90deg);
      
    }
  </style>
</head>
<body>
  <div class="box">My Box</div>
</body>
</html>
