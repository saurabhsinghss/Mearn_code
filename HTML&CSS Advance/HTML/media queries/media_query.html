<!DOCTYPE html>
<html lang="en">
<head>
  <title>media query</title>
  <style>
    .box{
      height: 100px;
      width: 100px;
      background-color: coral;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }
    @media (width:900px)
{
  .box{
    border: 10px solid black;
  }
}  
@media (min-width: 902px){
  .box{
    height: 150px;
    width: 150px;
  }
}
@media (max-width: 600px){
  .box{
    height: 80px;
    width: 80px;
  }
}
@media (min-width:600px) and (max-width:800px){
  .box{
    border-radius: 50%;
  }
}
</style>
</head>
<body>
  <div class="box">My Box</div>
</body>
</html>
