<!DOCTYPE html>
<html lang="en">
<head>
  <title> First Grid</title>
  <style>
    .container{
      background-color: blueviolet;
       display: grid;
       grid-template-rows: repeat(20,50px) 100px;
        grid-template-columns: repeat(auto-fit,150px);
       /* grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); */
       /* grid-template-columns: 1fr 2fr 1fr; */
       gap: 2px;
       /* overflow: auto;
       max-height: 150px; */
       grid-auto-rows: 50px;
       /* grid-auto-flow: column; */
       grid-auto-columns: 50px;
    }

    .cell{
      background-color: aquamarine;
      padding: 5px;
      /* margin: 5px; */
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid orangered;
      border-radius: 5px;
      
    }
    .item1{
     /* grid-row-start: 2;
     grid-row-end: 4; */
     grid-row: 2/span 2;
     grid-column-start: 2;
     grid-column-end: 4;
    z-index: 1;
    }
    .item8{
      grid-row-start: 3;
      /* grid-column-start: 1;
      grid-column-end: 4; */
      grid-column:1/4 ;
      
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="cell item1">1</div>
    <div class="cell">2</div>
    <div class="cell">3</div>
    <div class="cell">4</div>
    <div class="cell">5</div>
    <div class="cell">6</div>
    <div class="cell">7</div>
    <div class="cell item8">8</div>
  </div>
</body>
</html>
