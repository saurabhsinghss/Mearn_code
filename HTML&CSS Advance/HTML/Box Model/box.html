<!DOCTYPE html>
<html lang="en">
<head>
  <title>Learning box model</title>
  <style>
    *{
      margin: 0;
      padding: 0;
    }
    .my-box{
      background-color: cornflowerblue;
      height: 50px;
    width: 100px;
    padding: 10px 5px 10px 5px;
    margin: 5px 10px;
    border: 5px solid black;
    border-radius: 20px;
    text-align: center;
    box-sizing: content-box;
    }
  </style>
</head>
<body>
  <div class="my-box">My Box</div>
</body>
</html>
