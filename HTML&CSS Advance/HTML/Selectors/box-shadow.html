<!DOCTYPE html>
<html lang="en">
<head>
  <title>Learning box-shadow</title>
  <style>
    .box{
      background-color: aquamarine;
      width: 200px;
      height: 200px;
      border: solid 2px black;
      box-sizing: border-box;
      padding: 20px;
      border-radius: 10px;
      display: flex;
     align-items: center;
      justify-content: center;
      box-shadow:10px 10px 10px rgba(10, 10, 10, 0.5) ;
    }
  </style>
</head>
<body>
  <div class="box">My div</div>
</body>
</html>
