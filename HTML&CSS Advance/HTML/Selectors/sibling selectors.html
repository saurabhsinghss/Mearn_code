<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sibling selectors</title>
  <style>
    h1 + p{
      color:brown;
    }
    h1 ~ p{
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1>This is Heading H1.</h1>
  <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Facere dolorum atque iusto dolor omnis voluptatibus possimus velit quod doloribus beatae?</p>
  <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quibusdam, sapiente quasi temporibus deleniti eaque blanditiis.</p>
  
</body>
</html>
