<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add home</title>
  <link rel="stylesheet" href="/styles/output.css">
</head>
<body class="bg-gradient-to-r from-blue-50 to-indigo-50 min-h-screen flex items-center justify-center">
  <div class="text-center">
    <h1 class="text-5xl font-bold text-blue-600 mb-8">Add your Home</h1>
    <form action="/host/add-home" method="POST" class="bg-white p-8 rounded-lg shadow-lg max-w-md mx-auto">
      <input type="text" name="houseName" placeholder="Name of your house" class="w-full px-4 py-3 mb-6 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"/>
      <input type="submit" value="Add Home" class="w-full bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200 shadow-lg cursor-pointer"/>
    </form>
  </div>
</body>
</html>
